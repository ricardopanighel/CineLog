<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLog - Cadastrar Filme</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <nav>
        <div class="logo">🎥 CineLog</div>
        <div>
            <a th:href="@{/}">Início</a>
            <a th:href="@{/cadastro}">Novo Filme</a>
            <a th:href="@{/lista}">Meus Filmes</a>
        </div>
    </nav>

    <div class="container">
        <h1>Registrar Filme</h1>

        <form th:action="@{/filme}" th:object="${filme}" method="post">
            
            <div class="form-group">
                <label>Título do Filme:</label>
                <input type="text" th:field="*{titulo}" placeholder="Ex: Batman" required>
            </div>

            <div class="form-group">
                <label>Gênero:</label>
                <input type="text" th:field="*{genero}" placeholder="Ex: Ação, Drama..." required>
            </div>

            <div class="form-group">
                <label>Sua Nota (1 a 10):</label>
                <input type="number" th:field="*{nota}" min="1" max="10" required>
            </div>

            <input type="submit" value="Salvar no Diário">
        </form>
    </div>

</body>
</html>
