<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CineLog - Meus Filmes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <nav>
        <div class="logo">🎥 CineLog</div>
        <div>
            <a th:href="@{/}">Início</a>
            <a th:href="@{/cadastro}">Novo Filme</a>
            <a th:href="@{/lista}">Meus Filmes</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="link-button">Sair</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h1>🎬 Filmes Assistidos</h1>

        <table>
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Gênero</th>
                    <th>Sua Nota</th>
                    <th>Capa</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="f : ${listaFilmes}">
                    <td>
                        <a class="link-detalhes" th:href="@{/lista/{id}(id=${f.id})}" th:text="${f.titulo}"></a>
                    </td>
                    <td th:text="${f.genero}"></td>
                    <td>
                        <span class="nota-badge" th:text="${f.nota}"></span>
                    </td>
                    <td>
                        <img th:if="${f.imagemUrl != null}" th:src="${f.imagemUrl}" class="poster-thumb" alt="Capa do filme">
                        <span th:if="${f.imagemUrl == null}" class="muted">Sem capa</span>
                    </td>
                    <td class="action-cell">
                        <a class="btn-small" th:href="@{/filme/{id}/editar(id=${f.id})}">Editar</a>
                        <form th:action="@{/filme/{id}/deletar(id=${f.id})}" method="post" class="inline-form">
                            <button type="submit" class="btn-small btn-danger">Excluir</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(listaFilmes)}">
            <p>Nenhum filme cadastrado ainda. Que tal começar agora?</p>
        </div>
    </div>

</body>

</html>
