<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLog - Editar Filme</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <nav>
        <div class="logo">🎥 CineLog</div>
        <div>
            <a th:href="@{/}">Início</a>
            <a th:href="@{/cadastro}">Novo Filme</a>
            <a th:href="@{/lista}">Meus Filmes</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="link-button">Sair</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h1>Editar Filme</h1>

        <div th:if="${erroUpload}" class="alert alert-error" th:text="${erroUpload}"></div>

        <form th:action="@{/filme/{id}/editar(id=${id})}" th:object="${filme}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Título do Filme:</label>
                <input type="text" th:field="*{titulo}" required>
            </div>

            <div class="form-group">
                <label>Gênero:</label>
                <input type="text" th:field="*{genero}" required>
            </div>

            <div class="form-group">
                <label>Sua Nota (1 a 10):</label>
                <input type="number" th:field="*{nota}" min="1" max="10" required>
            </div>

            <div class="form-group">
                <label>Trocar Capa:</label>
                <input type="file" name="imagem" accept="image/*">
                <small class="form-help">Se enviar nova imagem, a anterior será substituída.</small>
            </div>

            <div class="preview-area" th:if="${filme.imagemUrl != null}">
                <p>Capa atual</p>
                <img th:src="${filme.imagemUrl}" alt="Capa atual do filme" class="poster-img">
            </div>

            <input type="submit" value="Salvar Alterações">
        </form>
    </div>

</body>
</html>
